services:
  - type: web
    name: facebook-ai-support-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: GRAPH_API_VERSION
        value: v25.0
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-2.5-flash
      - key: GEMINI_MAX_RETRIES
        value: "1"
      - key: BOT_NAME
        value: Tro Ly Facebook AI
      - key: VOICE_REPLIES_DEFAULT
        value: "false"
      - key: SETUP_MESSENGER_PROFILE_ON_START
        value: "true"
      - key: SETUP_MESSENGER_GREETING_ON_START
        value: "false"
      - key: AI_REPLY_TIMEOUT_MS
        value: "30000"
      - key: MAX_HISTORY_MESSAGES
        value: "16"
      - key: MAX_MEMORY_FACTS
        value: "40"
      - key: GEMINI_API_KEY
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: PAGE_ID
        sync: false
      - key: APP_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: MEMORY_FILE_PATH
        sync: false
      - key: REPORT_FILE_PATH
        sync: false
