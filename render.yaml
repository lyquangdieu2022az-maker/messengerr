services:
  - type: web
    name: facebook-ai-support-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: GRAPH_API_VERSION
        value: v25.0
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: OPENAI_REASONING_EFFORT
        value: medium
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
      - key: OPENAI_TTS_VOICE
        value: marin
      - key: BOT_NAME
        value: Tro Ly Facebook AI
      - key: VOICE_REPLIES_DEFAULT
        value: "false"
      - key: MAX_HISTORY_MESSAGES
        value: "16"
      - key: MAX_MEMORY_FACTS
        value: "40"
      - key: OPENAI_API_KEY
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: PAGE_ID
        sync: false
      - key: APP_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: MEMORY_FILE_PATH
        sync: false
